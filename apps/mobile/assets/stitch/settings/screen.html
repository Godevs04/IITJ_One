<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;

        }

        .technical-card {
            border: 1px solid #DED8CC;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .technical-card:active {
            transform: scale(0.98);
        }
        /* Custom Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #DED8CC;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #002947; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>

<script>
        // Dark Mode Toggle Logic
        const darkModeToggle = document.getElementById('darkModeToggle');
        const htmlElement = document.documentElement;

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                htmlElement.classList.add('dark');
                // Temporary manual override for the demo since the background color is inline
                document.body.style.backgroundColor = '#1a1c1e';
            } else {
                htmlElement.classList.remove('dark');
                document.body.style.backgroundColor = '#F6F0E4';
            }
        });

        // Add micro-interaction for list items
        document.querySelectorAll('button.technical-card').forEach(btn => {
            btn.addEventListener('click', () => {
                // Haptic feedback simulation
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });
    </script>
