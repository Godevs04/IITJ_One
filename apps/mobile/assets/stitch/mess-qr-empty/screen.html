<body class="bg-white text-on-surface font-body-lg min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-50 bg-primary text-on-primary h-16 flex items-center justify-between px-md shadow-none transition-colors duration-200">
<div class="flex items-center gap-md">
<button aria-label="Go back" class="material-symbols-outlined text-on-primary hover:bg-primary-container/20 p-2 rounded-full transition-colors">
                arrow_back
            </button>
<h1 class="font-headline-md text-headline-md font-bold tracking-tight">My Mess QR</h1>
</div>
<div class="flex items-center">
<button class="material-symbols-outlined text-on-primary hover:bg-primary-container/20 p-2 rounded-full transition-colors">
                help_outline
            </button>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center p-margin-mobile max-w-md mx-auto w-full">
<!-- Technical Module: QR Placeholder -->
<div class="w-full aspect-square qr-dashed-border flex flex-col items-center justify-center bg-surface-container-lowest p-xl mb-xl">
<div class="relative group">
<!-- Abstract Technical Visual via Shader/Animation -->
<div class="w-32 h-32 mb-lg flex items-center justify-center bg-surface-container-low rounded-xl">
<span class="material-symbols-outlined text-[64px] text-outline-variant" style="font-variation-settings: 'wght' 200;">
                        qr_code_2
                    </span>
</div>
<!-- Subtle status dot -->
<div class="absolute top-0 right-0 w-4 h-4 bg-error rounded-full border-2 border-white animate-pulse"></div>
</div>
<div class="text-center space-y-xs">
<h2 class="font-headline-md text-headline-md text-primary">No QR added yet</h2>
<p class="font-body-md text-on-surface-variant max-w-[240px] mx-auto">
                    Add your mess QR once to scan it quickly at the counter.
                </p>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-md">
<!-- Primary Button -->
<button class="w-full bg-primary text-on-primary font-body-lg py-4 rounded-[12px] flex items-center justify-center gap-xs hover:opacity-90 active:scale-[0.98] transition-all shadow-sm">
<span class="material-symbols-outlined">image</span>
                Import from Gallery
            </button>
<!-- Secondary/Outlined Button -->
<button class="w-full sandstone-border bg-transparent text-secondary font-body-lg py-4 rounded-[12px] flex items-center justify-center gap-xs hover:bg-surface-container-low active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">photo_camera</span>
                Scan with Camera
            </button>
</div>
<!-- Secondary Information / Help -->
<div class="mt-xl text-center">
<p class="font-label-sm text-outline flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]">lock</span>
                Your data is stored locally on this device
            </p>
</div>
</main>
<!-- Technical Accents -->
<div class="fixed bottom-12 left-0 right-0 pointer-events-none opacity-10 flex justify-center">
<span class="font-data-mono text-label-sm uppercase tracking-widest">IIT Jodhpur • Mess Utility v1.0.4</span>
</div>
<!-- Background Pattern -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(#002947 0.5px, transparent 0.5px); background-size: 24px 24px;">
</div>
<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {

                console.log('Button clicked:', this.innerText.trim());
