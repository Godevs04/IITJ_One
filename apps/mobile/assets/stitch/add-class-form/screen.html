</div>
<!-- Time and Type Layout -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Time Pickers -->
<div class="bg-white p-md border border-outline-variant rounded-xl space-y-md">
<h3 class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Schedule</h3>
<div class="flex items-center justify-between gap-4">
<div class="flex-1">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1">Start time</label>
<input class="w-full font-data-mono bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 focus:border-primary focus:ring-1 focus:ring-primary transition-all" name="start_time" type="time"/>
</div>
<div class="flex-1">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1">End time</label>
<input class="w-full font-data-mono bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 focus:border-primary focus:ring-1 focus:ring-primary transition-all" name="end_time" type="time"/>
</div>
</div>
</div>
<!-- Class Type (Radio Buttons) -->
<div class="bg-white p-md border border-outline-variant rounded-xl space-y-md">
<h3 class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Class Type</h3>
<div class="flex flex-wrap gap-xs">
<label class="relative flex items-center cursor-pointer group">
<input checked="" class="peer sr-only" name="class_type" type="radio" value="Lecture"/>
<div class="px-4 py-2 border border-outline-variant rounded-full text-body-md peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-all hover:bg-surface-container-high">
                                Lecture
                            </div>
</label>
<label class="relative flex items-center cursor-pointer group">
<input class="peer sr-only" name="class_type" type="radio" value="Lab"/>
<div class="px-4 py-2 border border-outline-variant rounded-full text-body-md peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-all hover:bg-surface-container-high">
                                Lab

</label>
<label class="relative flex items-center cursor-pointer group">
<input class="peer sr-only" name="class_type" type="radio" value="Tutorial"/>
<div class="px-4 py-2 border border-outline-variant rounded-full text-body-md peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-all hover:bg-surface-container-high">

</div>
</div>
</div>

<script>
        // Micro-interactions
        document.querySelectorAll('.day-checkbox').forEach(cb => {
            cb.addEventListener('change', function() {
                const label = this.nextElementSibling;
                if(this.checked) {
                    label.classList.add('bg-primary', 'text-on-primary', 'border-primary');
                    label.classList.remove('border-outline-variant', 'hover:bg-surface-container-low');
                } else {
                    label.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                    label.classList.add('border-outline-variant', 'hover:bg-surface-container-low');
                }
            });
        });

        // Form Submission Logic (Visual Feedback)
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Saving...`;
            
            setTimeout(() => {
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
                btn.classList.add('text-on-tertiary-container');
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Class Added!`;
                
                setTimeout(() => {
                    // Reset or Redirect
                    btn.classList.replace('bg-tertiary-container', 'bg-primary');
                    btn.classList.remove('text-on-tertiary-container');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }, 2000);
            }, 1000);
        });
    </script>
