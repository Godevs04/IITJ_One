<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F6F0E4;
            color: #1a1c1e;
        }
        .technical-border {
            border: 1px solid #DED8CC;
        }
        .canvas-container {
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="font-body-md text-body-md min-h-screen">
<!-- TopAppBar - Destination Shell -->
<!-- Applying Shared Component Logic: Fixed, Primary Bg, Navigation Hidden for Transactional Page -->
<header class="bg-primary text-on-primary w-full top-0 sticky z-50 transition-colors duration-200 h-16 flex items-center justify-between px-md shadow-sm">
<div class="flex items-center gap-md">
<button class="flex items-center justify-center w-10 h-10 hover:bg-primary-container/20 rounded-full transition-all">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-on-primary">Suggest Something</h1>
</div>
<div class="flex items-center gap-xs">
<button class="p-2 hover:bg-primary-container/20 rounded-full transition-all">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="px-margin-mobile py-lg canvas-container md:px-margin-desktop">
<!-- Header Messaging -->
<section class="mb-xl">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-xs">We're listening.</h2>
<p class="text-on-surface-variant font-body-lg text-body-lg">Have an idea to improve the IITJ one campus utility? Whether it's a new laundry slot or a bus route suggestion, let us know below.</p>
</section>
<!-- Form Module -->
<div class="bg-white p-md rounded-xl technical-border space-y-lg">
<!-- Category Tag Selection (Subtle Interaction) -->
<div class="space-y-xs">
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Category</span>
<div class="flex flex-wrap gap-xs">
<button class="px-md py-xs rounded-full border border-primary bg-primary text-on-primary text-label-sm font-label-sm">Hostel</button>
<button class="px-md py-xs rounded-full border border-outline-variant text-on-surface-variant text-label-sm font-label-sm hover:bg-surface-container-low transition-colors">Transport</button>
<button class="px-md py-xs rounded-full border border-outline-variant text-on-surface-variant text-label-sm font-label-sm hover:bg-surface-container-low transition-colors">Academic</button>
<button class="px-md py-xs rounded-full border border-outline-variant text-on-surface-variant text-label-sm font-label-sm hover:bg-surface-container-low transition-colors">Other</button>
</div>
</div>
<!-- Main Input Section -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline uppercase tracking-wider" for="suggestion">Your Suggestion</label>
<textarea class="w-full p-md bg-surface-bright rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all resize-none font-body-lg text-body-lg placeholder:text-outline-variant" id="suggestion" placeholder="e.g. Add my hostel's laundry slot..." rows="8"></textarea>
<div class="flex justify-between items-center px-1">
<span class="text-outline text-label-sm font-label-sm" id="char-count">0 / 500</span>
<span class="material-symbols-outlined text-outline-variant text-sm">edit_note</span>
</div>
</div>
<!-- Identity Toggle (Engineering Detail) -->
<div class="flex items-center justify-between p-sm bg-surface-container-low rounded-lg">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary">account_circle</span>
<span class="font-body-md text-body-md text-on-surface">Submit anonymously</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value="">
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-md rounded-xl font-headline-md text-headline-md hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-xs shadow-md" id="send-btn">
<span class="">Send</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
<!-- Decorative/Contextual Element: Minimalist Illustration Placeholder -->
<div class="mt-xl opacity-40 grayscale flex justify-center">
<div class="w-32 h-32 rounded-full flex items-center justify-center bg-outline-variant/10 border border-dashed border-outline-variant">
<span class="material-symbols-outlined text-4xl text-outline">lightbulb</span>
</div>
</div>
</main>
<!-- Bottom Navigation Hidden (Suppressing as per Task Guidance for Task-Focused screens) -->
<script>
        // Micro-interactions for the Suggestion Screen
        const textarea = document.getElementById('suggestion');
        const charCount = document.getElementById('char-count');
        const sendBtn = document.getElementById('send-btn');

        textarea.addEventListener('input', (e) => {
            const length = e.target.value.length;
            charCount.textContent = `${length} / 500`;
            
            if (length > 500) {
                charCount.classList.add('text-error');
                sendBtn.disabled = true;
                sendBtn.classList.add('opacity-50');
            } else {
                charCount.classList.remove('text-error');
                sendBtn.disabled = false;
                sendBtn.classList.remove('opacity-50');
            }
        });

        sendBtn.addEventListener('click', () => {
            if (textarea.value.trim() === "") {
                textarea.classList.add('border-error');
                setTimeout(() => textarea.classList.remove('border-error'), 2000);
                return;
            }
            
            sendBtn.innerHTML = `
                <span class="material-symbols-outlined animate-spin">progress_activity</span>
                <span>Sending...</span>
            `;
            
            setTimeout(() => {
                sendBtn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Sent!</span>
                `;
                sendBtn.classList.remove('bg-primary');
                sendBtn.classList.add('bg-secondary');
                textarea.value = "";
                charCount.textContent = "0 / 500";
            }, 1500);
        });

        // Category Selection Logic
        const categoryBtns = document.querySelectorAll('button.rounded-full');
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => {
                    b.classList.remove('bg-primary', 'text-on-primary');
                    b.classList.add('border-outline-variant', 'text-on-surface-variant');
                });
                btn.classList.remove('border-outline-variant', 'text-on-surface-variant');
                btn.classList.add('bg-primary', 'text-on-primary', 'border-primary');
            });
        });
    </script>


</body></html>
