services:
  api:
    build: .
    ports:
      - "6002:6002"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/iitj1
      - PORT=6002
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo_data:
