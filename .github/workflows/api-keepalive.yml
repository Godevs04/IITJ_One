name: API Keep-Alive

# Pings the deployed health endpoint so free-tier hosts (e.g. Render) stay warm.
# Set repository secret API_HEALTH_URL to https://<your-api>/api/v1/health

on:
  schedule:
    - cron: '0 0 * * *' # daily at midnight
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        run: |
          if [ -z "$API_HEALTH_URL" ]; then
            echo "API_HEALTH_URL secret not set — skipping"
            exit 0
          fi
          curl -fsS --max-time 15 "$API_HEALTH_URL" | head -c 500
          echo
